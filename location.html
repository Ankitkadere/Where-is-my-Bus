<script>

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }

    function startTracking() {

        const savedId = localStorage.getItem("busId");
        if (!savedId) return;

        if (!navigator.geolocation) return;

        navigator.geolocation.watchPosition((position) => {

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            if (navigator.serviceWorker.controller) {

                navigator.serviceWorker.controller.postMessage({

                    type: "LOCATION_UPDATE",
                    lat: lat,
                    lng: lng,
                    id: savedId

                });

            }

        }, (error) => {

            console.log("Location Error:", error);

        }, { enableHighAccuracy: true });

    }

    setTimeout(startTracking, 2000);

</script>

text-white shadow-xl bg-gray-100 active:scale-95 transition duration-300">

    <script>
        ////////////////////////////////////////////////////////////
        // GLOBAL STATE
        ////////////////////////////////////////////////////////////

        const stopsAPI = "https://script.google.com/macros/s/AKfycbzJd3_oaTXnpYteiJA8rKuA_70et_L_Bk2QSB5iNtOPcsebr2crkzy7EFzxTkJ1dsao/exec";

        const liveAPI = "https://script.google.com/macros/s/AKfycbzE-2BVHzWH6uMO7ONvPsKeFHnU8ttY9yFuT1MJl6F0D2xhhZza1EKdqZvdrXr_faoZ/exec?action=read";

        const params = new URLSearchParams(window.location.search);
        const number = params.get("number");
          const english = params.get("english");
            const hindi= params.get("hindi");

        let stopsData = [];
        let busLocation = null;

        let fetchLock = false;

        ////////////////////////////////////////////////////////////
        // SAFE FETCH ENGINE
        ////////////////////////////////////////////////////////////

        async function fetchStops() {

            try {

                const res = await fetch(stopsAPI, { cache: "no-store" });
                const data = await res.json();

                stopsData = data.filter(row =>
                    row.Number == number &&
                    row.Arrival &&
                    row.Departure
                );

                renderStops();
                document.getElementById("busnumber").innerText =  number +" : "+ english+" / "+ hindi;
            } catch (e) {
                console.log(e);
            }

            const loader = document.getElementById("loader");
            if (loader) loader.style.display = "none";
        }

        ////////////////////////////////////////////////////////////
        // RENDER STOPS (FAST DOM BUILD)
        ////////////////////////////////////////////////////////////

        function renderStops() {

            const container = document.getElementById("location");

            if (!container) return;

            let html = "";

            stopsData.forEach(stop => {
           
                html += `
        <div class="relative flex items-center bg-white px-3 py-5 stop-row"
             data-lat="${Number(stop.Latitude)}"
             data-lng="${Number(stop.Longitude)}">

            <div class="w-1/4 text-left">
                <span class="text-green-600 font-bold text-sm">${stop.Arrival}</span>
            </div>

            <div class="flex flex-col items-center w-[25px] relative">
                <div class="w-2 h-2 bg-black absolute ml-[-50%] rounded-full z-50"></div>
            </div>

            <div class="flex flex-col w-1/2 pl-2 py-[15px]">
                <span class="font-semibold text-gray-800">${stop.Place}</span>
                <span class="text-xs text-gray-500">${stop.Bus}</span>
            </div>

            <div class="w-1/4 text-right">
                <span class="text-red-600 font-bold text-sm">${stop.Departure}</span>
            </div>

        </div>`;
            });

            container.innerHTML = html;
            setTimeout(() => {
                document
                    .getElementById("trackRange")
                    .dispatchEvent(new Event("input"));
            }, 2000);
            const range = document.getElementById("trackRange");
            const rangeBox = document.getElementById("rangebox");
            function setRangeBoxHeight(value) {
                range.style.width = (value * 110) + "px";
            }
            range.addEventListener("input", function () {
                const value = this.value;
                // Slider fill gradient
                this.style.background =
                    `linear-gradient(to right,
                       #1d7ed8 0%,
                      #1a62a3 ${value}%,
                       #a0c8fa ${value}%,
                        #bfdbfe 100%)`;
                // Change rangebox height (value × 70 px)
                setRangeBoxHeight(stopsData.length);
            });
        }

        ////////////////////////////////////////////////////////////
        // DISTANCE CALCULATOR
        ////////////////////////////////////////////////////////////

        function getDistance(lat1, lon1, lat2, lon2) {

            const R = 6371;

            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) *
                Math.sin(dLon / 2);

            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        ////////////////////////////////////////////////////////////
        // TRACKER ENGINE (FAST)
        ////////////////////////////////////////////////////////////

        function updateTracker() {

            if (!busLocation || !stopsData.length) return;

            const busLat = Number(busLocation.Latitude);
            const busLng = Number(busLocation.Longitude);
            const speed = Number(busLocation.Speed) || 0;

            const rows = document.querySelectorAll(".stop-row");

            let nearestIndex = 0;
            let nearestDistance = Infinity;

            rows.forEach((row, index) => {

                const lat = Number(row.dataset.lat);
                const lng = Number(row.dataset.lng);

                if (!lat || !lng) return;

                const dist = getDistance(busLat, busLng, lat, lng);

                if (dist < nearestDistance) {
                    nearestDistance = dist;
                    nearestIndex = index;
                }
            });

            updateFooter(nearestIndex, nearestDistance);

            document.querySelectorAll(".bus-badge").forEach(el => el.remove());

            const rowsArray = Array.from(rows);

            if (rowsArray[nearestIndex]) {

                const badge = document.createElement("div");

                badge.className =
                    "bus-badge hidden absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white text-xs px-2 py-1 rounded-full animate-pulse";

                badge.innerHTML =
                    `🚌 BUS HERE<br><span class="text-[10px]">${speed} km/h</span>`;

                rowsArray[nearestIndex].appendChild(badge);
            }

            updateProgressLine(nearestIndex);
        }

        ////////////////////////////////////////////////////////////
        // FOOTER UPDATE
        ////////////////////////////////////////////////////////////

        function updateFooter(nearestIndex, nearestDistance) {

            const arrival = document.getElementById("arrivalTime");
            const next = document.getElementById("departureTime");
            const destination = document.getElementById("DestinationTime");

            if (!stopsData.length) return;

            const currentPlace = stopsData[nearestIndex]?.Place || "-";
            const nextPlace = stopsData[nearestIndex + 1]?.Place || "Last Stop";
            const lastPlace = stopsData[stopsData.length - 1]?.Place || "-";

            if (arrival)
                arrival.innerText =
                    `${currentPlace} (${nearestDistance.toFixed(2)} km)`;

            if (next)
                next.innerText = nextPlace;

            if (destination)
                destination.innerText = lastPlace;
        }

        ////////////////////////////////////////////////////////////
        // PROGRESS LINE
        ////////////////////////////////////////////////////////////

        function updateProgressLine(index) {

            const progress = document.getElementById("trackRange");

            if (!progress || !stopsData.length) return;

            progress.value = ((index) / stopsData.length) * 100;
        }

        ////////////////////////////////////////////////////////////
        // LIVE BUS FETCH
        ////////////////////////////////////////////////////////////

        async function fetchBusLocation() {

            if (fetchLock) return;

            fetchLock = true;

            try {

                const res = await fetch(liveAPI, { cache: "no-store" });
                const data = await res.json();

                const filtered = data.filter(row => row.Id == 1234);

                if (filtered.length) {
                    busLocation = filtered[filtered.length - 1];
                    updateTracker();
                }

            } catch (e) {
                console.log(e);
            }

            fetchLock = false;
        }

        ////////////////////////////////////////////////////////////
        // REFRESH BUTTON
        ////////////////////////////////////////////////////////////

        function bindRefreshOnce() {

            const refreshBtn = document.getElementById("refreshBtn");
            const refreshIcon = document.getElementById("refreshIcon");

            if (!refreshBtn) return;

            refreshBtn.onclick = () => {

                if (refreshIcon)
                    refreshIcon.classList.add("fast-spin");

                fetchBusLocation();

                setTimeout(() => {
                    if (refreshIcon)
                        refreshIcon.classList.remove("fast-spin");
                }, 1500);
            };
        }

        ////////////////////////////////////////////////////////////
        // INTERVAL ENGINE
        ////////////////////////////////////////////////////////////

        setInterval(fetchBusLocation, 3000);

        ////////////////////////////////////////////////////////////
        // PAGE LOAD
        ////////////////////////////////////////////////////////////

        window.addEventListener("load", async () => {

            await fetchStops();
            bindRefreshOnce();
            fetchBusLocation();

        });
    </script>
