<script>

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }

    function startTracking() {

        const savedId = localStorage.getItem("busId");
        if (!savedId) return;

        if (!navigator.geolocation) return;

        navigator.geolocation.watchPosition((position) => {

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            if (navigator.serviceWorker.controller) {

                navigator.serviceWorker.controller.postMessage({

                    type: "LOCATION_UPDATE",
                    lat: lat,
                    lng: lng,
                    id: savedId

                });

            }

        }, (error) => {

            console.log("Location Error:", error);

        }, { enableHighAccuracy: true });

    }

    setTimeout(startTracking, 2000);

</script>

    <script>

        const stopsAPI = "https://script.google.com/macros/s/AKfycbzJd3_oaTXnpYteiJA8rKuA_70et_L_Bk2QSB5iNtOPcsebr2crkzy7EFzxTkJ1dsao/exec";

        const params = new URLSearchParams(window.location.search);
        const number = params.get("number");

                container.appendChild(div);

        function updateFooter(nearestIndex, nearestDistance) {

            const current = document.getElementById("arrivalTime");
            const next = document.getElementById("departureTime");
            const destination = document.getElementById("DestinationTime");

            if (!stopsData.length) return;

            const currentPlace = stopsData[nearestIndex]?.Place || "-";
            const nextPlace = stopsData[nearestIndex + 1]?.Place || "Last Stop";
            const lastPlace = stopsData[stopsData.length - 1]?.Place || "-";

            if (current) {
                current.innerHTML = `${currentPlace} (${nearestDistance.toFixed(2)} km)`;
            }

            if (next) {
                next.innerHTML = nextPlace;
            }

            if (destination) {
                destination.innerHTML = lastPlace;
            }

        }
        async function fetchBusLocation() {

            const res = await fetch(liveAPI);
            const data = await res.json();
            const filtered = data.filter(row => row.Id == 1234);
            if (!filtered.length) return;
            busLocation = filtered[filtered.length - 1];
            updateTracker();

        }
        document.getElementById("refreshBtn").onclick = () => {
            fetchBusLocation();
        };
        function getDistance(lat1, lon1, lat2, lon2) {

            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) *
                Math.sin(dLon / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;

        }

        function updateTracker() {

            if (!busLocation || stopsData.length === 0) return;

            const busLat = Number(busLocation.Latitude);
            const busLng = Number(busLocation.Longitude);
            const speed = Number(busLocation.Speed) || 0;

            const rows = document.querySelectorAll(".stop-row");

            let nearestIndex = 0;
            let nearestDistance = Infinity;

            rows.forEach((row, index) => {

                const lat = Number(row.dataset.lat);
                const lng = Number(row.dataset.lng);

                if (!lat || !lng) return;

                const dist = getDistance(busLat, busLng, lat, lng);

                if (dist < nearestDistance) {

                    nearestDistance = dist;
                    nearestIndex = index;

                }

            });

            const nearBox = document.getElementById("busNear");

            if (nearBox) {

                const place = stopsData[nearestIndex].Place;

                let status = "On the way";

                if (nearestDistance < 0.1) status = "Arriving";
                else if (nearestDistance < 1) status = "Near";

                nearBox.innerHTML = `🚌 Bus ${status} <b>${place}</b> (${nearestDistance.toFixed(2)} km)`;

            }

            document.querySelectorAll(".bus-badge").forEach(b => b.remove());

            const badge = document.createElement("div");

            badge.className = "bus-badge hidden absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white text-xs px-2 py-1 rounded-full animate-pulse";

            badge.innerHTML = `🚌 BUS HERE<br><span class="text-[10px]">${speed} km/h</span>`;

            rows[nearestIndex].appendChild(badge);

            if (nearestIndex < rows.length - 1) {

                const next = document.createElement("div");

                next.className = "";

                next.innerHTML = " ";

                rows[nearestIndex + 1].appendChild(next);

            }

            updateProgressLine(nearestIndex);
            updateFooter(nearestIndex, nearestDistance);
        }

        function updateProgressLine(index) {

            const progress = document.getElementById("trackRange");

            if (!progress) return;

            const percent = ((index) / stopsData.length) * 100;

            progress.value = percent;

        }

        setInterval(fetchBusLocation, 2000);

        window.onload = async () => {

            await fetchStops();
            fetchBusLocation();

        };

        const refreshBtn = document.getElementById("refreshBtn");
        const refreshIcon = document.getElementById("refreshIcon");

        refreshBtn.onclick = () => {
            refreshIcon.classList.add("fast-spin");
            fetchBusLocation();
            setTimeout(() => {
                refreshIcon.classList.remove("fast-spin");
            }, 2000);
            fetchBusLocation(); // your refresh function
        };  
    </script>
