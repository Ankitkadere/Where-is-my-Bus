<script>
  // Register Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

  // Start tracking
  function startTracking() {

    const savedId = localStorage.getItem("busId");
    if (!savedId) return;

    if (!navigator.geolocation) return;

    navigator.geolocation.watchPosition((position) => {

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: "LOCATION_UPDATE",
          lat: lat,
          lng: lng,
          id: savedId
        });
      }

    }, (error) => {
      console.log("Location Error:", error);
    }, {
      enableHighAccuracy: true
    });
  }

  setTimeout(startTracking, 2000);
</script>

      <script>
  const pwaBtn = document.getElementById('pwaInstallBtn');
  const statusMsg = document.getElementById('installStatusMsg');
  const menu = document.getElementById('menu');

  let deferredPrompt = null;
  let appInstalled = false;

  // Detect if app already installed (Standalone mode)
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
    appInstalled = true;
    statusMsg.textContent = "App Already Installed";
    pwaBtn.textContent = "Open App";
    pwaBtn.classList.remove("bg-blue-600");
    pwaBtn.classList.add("bg-green-600");
  }

  // Initially disabled
  pwaBtn.disabled = true;

  // Listen when install is available
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    if (!appInstalled) {
      pwaBtn.disabled = false;
      statusMsg.textContent = "Install Now";
    }
  });

  // Install button click
  pwaBtn.addEventListener('click', async () => {

    // If already installed
    if (appInstalled) {
      statusMsg.textContent = "App is already installed on your device.";
      pwaBtn.classList.remove("bg-blue-600");
      pwaBtn.classList.add("bg-green-600");
      return;
    }

    // If not supported
    if (!deferredPrompt) {
      statusMsg.textContent = "⚠️ Installation Not Supported On This Device";
      pwaBtn.classList.remove("bg-blue-600");
      pwaBtn.classList.add("bg-red-500");
      return;
    }

    // Show installing state
    statusMsg.textContent = "Installing...";
    pwaBtn.disabled = true;
    pwaBtn.textContent = "Please Wait...";

    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === 'accepted') {

      statusMsg.textContent = "🎉 App Installed Successfully!";
      pwaBtn.textContent = "Installed";
      pwaBtn.classList.remove("bg-blue-600");
      pwaBtn.classList.add("bg-green-600");

      appInstalled = true;

      // Auto close modal after 2 seconds
      setTimeout(() => {
        menu.classList.add("hidden");
      }, 2000);

    } else {

      statusMsg.textContent = "❌ Installation Cancelled By User";
      pwaBtn.textContent = "Try Again";
      pwaBtn.disabled = false;
    }

    deferredPrompt = null;
  });

  // If installation happens externally
  window.addEventListener('appinstalled', () => {

    appInstalled = true;

    statusMsg.textContent = "🎉 App Installed Successfully!";
    pwaBtn.textContent = "Installed";
    pwaBtn.classList.remove("bg-blue-600");
    pwaBtn.classList.add("bg-green-600");
    pwaBtn.disabled = true;

    setTimeout(() => {
      menu.classList.add("hidden");
    }, 2000);
  });
</script>

    const mobileMenuButton = document.getElementById("mobile-menu-button");
    const mobileMenuClose = document.getElementById("mobile-menu-close");
    const mobileNav = document.getElementById("mobile-nav");


    function openMenu() {
      mobileNav.classList.remove("-translate-x-full");
      overlay.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      mobileNav.classList.add("-translate-x-full");
      overlay.classList.add("hidden");
      document.body.style.overflow = "";
    }

    mobileMenuButton.addEventListener("click", openMenu);
    mobileMenuClose.addEventListener("click", closeMenu);
    overlay.addEventListener("click", closeMenu);

    // Modal
    const openBtn = document.getElementById("openModalBtn");
    const closeBtn = document.getElementById("closeModalBtn");
    const closeBtnFooter = document.getElementById("closeModalBtnFooter");
    const modalOverlay = document.getElementById("modalOverlay");
    const modalBox = document.getElementById("modalBox");

    function openModal() {
      modalOverlay.classList.remove("opacity-0", "pointer-events-none");
      modalOverlay.classList.add("opacity-100");
      modalBox.classList.remove("opacity-0", "scale-95", "fade-out");
      modalBox.classList.add("fade-in");
    }

    function closeModal() {
      modalBox.classList.remove("fade-in");
      modalBox.classList.add("fade-out");
      modalOverlay.classList.remove("opacity-100");
      modalOverlay.classList.add("opacity-0");

      setTimeout(() => {
        modalOverlay.classList.add("pointer-events-none");
        modalBox.classList.remove("fade-out");
        modalBox.classList.add("opacity-0", "scale-95");
      }, 300);
    }

    openBtn.addEventListener("click", openModal);
    closeBtn.addEventListener("click", closeModal);
    closeBtnFooter.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !modalOverlay.classList.contains("pointer-events-none")) {
        closeModal();
      }
    });



    // Show modal
    function showModal() {
      modalOverlay.classList.remove("opacity-0", "pointer-events-none");
      modalBox.classList.remove("opacity-0", "scale-95");
      modalOverlay.classList.add("opacity-100");
      modalBox.classList.add("opacity-100", "scale-100");
    }

    window.addEventListener("load", () => {

    function redirectToCourse() {
      const value = firstinput.value.trim();
      if (value !== "") {
        window.location.href = `Courselist.html?search=${encodeURIComponent(value)}`;
      }
    }

    firstinput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        redirectToCourse();
      }
    });
    searchbtn.addEventListener("click", redirectToCourse);

    // Menu toggle
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("hidden");
    }
    // Simulate progress (alternative random style)
    function simulateProgress(callback) {
      let progress = 0;
      const interval = setInterval(() => {
        if (progress >= 100) {
          clearInterval(interval);
          progress = 100;
          progressBar.style.width = "100%";
          progressText.innerText = "100%";

          if (progress > 100) progress = 100;
          progressBar.style.width = `${progress}%`;
          progressText.innerText = `${Math.floor(progress)}%`;
        }
      }, 200);
    }

  </script>

  // Utility function to create suggestion items
  function createSuggestionItem(text) {
    const div = document.createElement("div");
    div.classList.add("suggestion-item");
    div.setAttribute("role", "option");
    div.textContent = text;
    return div;
  }

  // Generic function to handle input and suggestions
  function setupAutocomplete(inputEl, suggestionsEl, dataList) {
    let selectedIndex = -1;

    inputEl.addEventListener("input", () => {
      const val = inputEl.value.trim().toLowerCase();
      suggestionsEl.innerHTML = "";
      selectedIndex = -1;
      if (!val) {
        suggestionsEl.classList.add("hidden");
        return;
      }
      const filtered = dataList.filter((item) =>
        item.toLowerCase().includes(val)
      );
      if (filtered.length === 0) {
        suggestionsEl.classList.add("hidden");
        return;
      }
      filtered.forEach((item) => {
        const suggestionItem = createSuggestionItem(item);
        suggestionItem.addEventListener("mousedown", (e) => {
          e.preventDefault(); // Prevent losing focus
          inputEl.value = item;
          suggestionsEl.classList.add("hidden");
        });
        suggestionsEl.appendChild(suggestionItem);
      });
      suggestionsEl.classList.remove("hidden");
    });

    // Hide suggestions on blur with slight delay to allow click
    inputEl.addEventListener("blur", () => {
      setTimeout(() => {
        suggestionsEl.classList.add("hidden");
        selectedIndex = -1;
      }, 150);
    });

    // Keyboard navigation
    inputEl.addEventListener("keydown", (e) => {
      const items = suggestionsEl.querySelectorAll(".suggestion-item");
      if (items.length === 0) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % items.length;
        updateActive(items, selectedIndex);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateActive(items, selectedIndex);
      } else if (e.key === "Enter") {
        if (selectedIndex >= 0 && selectedIndex < items.length) {
          e.preventDefault();
          inputEl.value = items[selectedIndex].textContent;
          suggestionsEl.classList.add("hidden");
          selectedIndex = -1;
        }
      } else {
        selectedIndex = -1;
        updateActive(items, selectedIndex);
      }
    });

    function updateActive(items, index) {
      items.forEach((item, i) => {
        if (i === index) {
          item.classList.add("active");
          item.setAttribute("aria-selected", "true");
          item.scrollIntoView({ block: "nearest" });
        } else {
          item.classList.remove("active");
          item.removeAttribute("aria-selected");
        }
      });
    }
  }

  // Setup autocomplete for each input
